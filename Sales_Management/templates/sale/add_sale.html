{% extends 'master/base.html' %}

{% block body %}
  <title>Add | Sale</title>
  <h1>Please Provide Necessary Information</h1>
  <div class="mt-3">
    <form action="" method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Product Name</label>
        <input name="product_name" type="text" class="form-control" id="exampleInputPassword1" placeholder="Product Name" required />
      </div>
      <div class="mb-3">
        <div class="mb-3">
          <select name="category" class="form-select" aria-label="Default select example">
            <option selected>Open this select menu</option>
            {% for c in cate %}
              <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Unit Price</label>
        <input name="unit_price" type="number" class="form-control" id="exampleInputPassword1" placeholder="Prodive per piece price" required />
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Quantity</label>
        <input name="quantity" type="number" class="form-control" id="exampleInputPassword1" placeholder="Provide Quantity in Number" required />
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Discount Percentage</label>
        <input name="discount_percent" type="number" class="form-control" id="exampleInputPassword1" placeholder="Provide Percentage Number" />
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Tax Percentage</label>
        <input name="tax_percent" type="number" class="form-control" id="exampleInputPassword1" placeholder="Provide Percentage Number" />
      </div>
      <button type="submit" class="btn btn-primary">Add Sale</button>
    </form>
  </div>
{% endblock %}
