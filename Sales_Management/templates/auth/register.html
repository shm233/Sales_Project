{% extends 'master/base.html' %}

{% block body %}
  <title>Register | Page</title>
  <body>
    <form action="" method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Username</label>
        <input name="username" type="text" class="form-control" id="exampleInputPassword1" placeholder="Enter Your Desired Username" />
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Full Name</label>
        <input name="full_name" type="text" class="form-control" id="exampleInputPassword1" placeholder="Enter Your Full Name" />
      </div>
      <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label">Email address</label>
        <input name="email" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="example@example.com" />
        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Password</label>
        <input name="password" type="password" class="form-control" id="exampleInputPassword1" placeholder="Provide Password" />
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Password</label>
        <input name="c_password" type="password" class="form-control" id="exampleInputPassword1" placeholder="Confirm Your Password" />
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1" />
        <label class="form-check-label" for="exampleCheck1">Check me out</label>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <div class="mb-3">
      <label for="">Already Have an Account?</label>
      <a href="{% url 'login_view' %}" class="btn btn-info">Log-In</a>
    </div>
  </body>
{% endblock %}
